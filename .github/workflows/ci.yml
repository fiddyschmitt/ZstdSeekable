name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  build:
    runs-on: windows-latest   # net48 test target needs .NET Framework
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # SourceLink wants full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build ZstdSeekable.slnx -c Release

      - name: Test
        run: dotnet test ZstdSeekable.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack src/ZstdSeekable -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Push to nuget.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
