name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  build:
    runs-on: windows-latest   # net48 test target needs .NET Framework
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0      # SourceLink wants full history

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build ZstdSeekable.slnx -c Release

      - name: Test
        run: dotnet test ZstdSeekable.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack src/ZstdSeekable -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: artifacts/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for nuget.org trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: packages
          path: artifacts

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Get short-lived API key (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: fiddyschmitt

      - name: Push to nuget.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
